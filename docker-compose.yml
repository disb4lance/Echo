version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-minio
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-echo_db}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-echo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - echo-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-app
    ports:
      - "${API_PORT:-8081}:8081"
    environment:
      # App
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8081}
      
      # Database - используем имя сервиса, а не localhost!
      DB_HOST: postgres
      DB_PORT: 5432  # внутренний порт контейнера
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-echo_db}
      DB_SSLMODE: disable
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-168h}
      
      # MinIO - используем имя сервиса, а не localhost!
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-uploads}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_LOCATION: ${MINIO_LOCATION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - echo-network
    restart: unless-stopped

networks:
  echo-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: