basePath: /api/v1
definitions:
  dto.Gender:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - PreferNotToSay
    - Male
    - Female
    - Other
  dto.UserProfileRequest:
    properties:
      birth_date:
        type: string
      description:
        maxLength: 500
        type: string
      gender:
        $ref: '#/definitions/dto.Gender'
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - birth_date
    - gender
    - name
    type: object
  dto.UserProfileResponse:
    properties:
      age:
        type: integer
      created_at:
        type: string
      description:
        type: string
      gender:
        $ref: '#/definitions/dto.Gender'
      is_active:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.UserPhoto:
    properties:
      createdAt:
        type: string
      id:
        type: string
      position:
        type: integer
      url:
        type: string
      userID:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: API дейтинг сервиса
  title: Echo Api
  version: "1.0"
paths:
  /profiles:
    post:
      consumes:
      - application/json
      description: Создает новый профиль пользователя
      parameters:
      - description: Данные профиля
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UserProfileRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserProfileResponse'
        "400":
          description: invalid body
          schema:
            type: string
        "409":
          description: profile already exists
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создание профиля пользователя
      tags:
      - profiles
  /profiles/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает профиль пользователя по ID
      parameters:
      - description: ID пользователя
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfileResponse'
        "400":
          description: invalid user id
          schema:
            type: string
        "404":
          description: profile not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение профиля пользователя
      tags:
      - profiles
    put:
      consumes:
      - application/json
      description: Обновляет существующий профиль пользователя
      parameters:
      - description: ID пользователя
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UserProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfileResponse'
        "400":
          description: invalid body or user id
          schema:
            type: string
        "404":
          description: profile not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновление профиля пользователя
      tags:
      - profiles
  /user/photos:
    get:
      description: Возвращает все фото пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.UserPhoto'
            type: array
        "404":
          description: photos not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получение фото пользователя
      tags:
      - user-photos
    put:
      consumes:
      - multipart/form-data
      description: Заменяет все фото пользователя
      parameters:
      - collectionFormat: csv
        description: Файлы фото
        in: formData
        items:
          type: file
        name: photos
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.UserPhoto'
            type: array
        "400":
          description: invalid files
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Загрузка/замена фото пользователя
      tags:
      - user-photos
securityDefinitions:
  BearerAuth:
    description: Введите ваш JWT токен без префикса "Bearer"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
